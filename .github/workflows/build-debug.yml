name: Build Debug APK (Chinese)

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

jobs:
  build-debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "corretto"
          cache: "gradle"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug
      - name: Prepare APK
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk artifacts/BatStats-zh-debug.apk
      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: BatStats-ZH-Debug-APK
          path: artifacts/*
          retention-days: 30
